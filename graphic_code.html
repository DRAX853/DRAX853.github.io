<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DRAX · Ultimate Mobile Inspector + Antutu</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:radial-gradient(circle at 10% 20%,#0a0f2a,#030614);font-family:system-ui,'Segoe UI',sans-serif;padding:20px;min-height:100vh;color:#eef4ff}
    .container{max-width:1000px;margin:0 auto}
    .drax-header{text-align:center;margin-bottom:20px}
    .drax-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);border-radius:100px;padding:6px 20px 6px 16px;border:1px solid rgba(255,180,80,0.6);box-shadow:0 0 12px rgba(255,180,80,0.2)}
    .drax-icon{font-size:1.3rem}
    .drax-text{font-size:0.75rem;letter-spacing:1.5px;background:linear-gradient(135deg,#ffdd99,#ffaa66);-webkit-background-clip:text;background-clip:text;color:transparent}
    .drax-name{font-weight:800;color:#ffcc88}
    h1{text-align:center;font-size:1.6rem;margin:5px 0;background:linear-gradient(135deg,#aaffdd,#77aaff);-webkit-background-clip:text;background-clip:text;color:transparent}
    .sub{text-align:center;color:#8899cc;margin-bottom:25px;font-size:0.85rem}
    .card{background:rgba(15,25,45,0.7);backdrop-filter:blur(12px);border-radius:32px;border:1px solid rgba(100,150,255,0.3);margin-bottom:24px;overflow:hidden}
    .card-header{background:rgba(0,0,0,0.5);padding:14px 20px;border-bottom:1px solid rgba(255,200,100,0.3)}
    .card-header h2{font-size:1.3rem;display:flex;align-items:center;gap:10px}
    .card-content{padding:18px 22px}
    .check-item{margin-bottom:28px;border-left:3px solid #ffaa66;padding-left:16px}
    .check-label{font-weight:700;font-size:1.05rem;color:#ffdd99;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:8px}
    .check-value{font-family:monospace;background:#0a0f1e;padding:6px 12px;border-radius:20px;display:inline-block;font-size:0.9rem}
    .check-explanation{font-size:0.85rem;color:#bbccff;line-height:1.5;margin-top:8px;background:rgba(0,0,0,0.3);padding:10px 14px;border-radius:20px}
    .badge-yes{background:#15803d;color:#bbf7d0;padding:2px 12px;border-radius:30px;font-size:0.75rem;display:inline-block}
    .badge-no{background:#b91c1c;color:#fecaca;padding:2px 12px;border-radius:30px;font-size:0.75rem;display:inline-block}
    .recheck-btn{background:#3a5a9e;border:none;padding:14px 28px;border-radius:60px;font-weight:bold;font-size:1rem;color:white;cursor:pointer;width:100%;margin-top:10px;transition:0.1s}
    .recheck-btn:active{transform:scale(0.97);background:#2a4a8e}
    .antutu-box{background:linear-gradient(135deg,#1a2a4a,#0a1022);border-radius:28px;padding:18px;margin-top:10px;text-align:center;border:1px solid #ffaa66}
    .antutu-score{font-size:2.2rem;font-weight:bold;color:#ffdd99}
    .input-watt{width:100px;background:#0f172a;border:1px solid #ffaa66;border-radius:40px;padding:6px 12px;color:white;text-align:center}
    footer{text-align:center;font-size:0.7rem;color:#6688aa;margin-top:20px}
  </style>
</head>
<body>
<div class="container">
  <div class="drax-header">
    <div class="drax-badge"><span class="drax-icon">⚡</span><span class="drax-text">APP MADE BY</span><span class="drax-name">DRAX</span></div>
  </div>
  <h1>📱 ULTIMATE HARDWARE INSPECTOR</h1>
  <div class="sub">Everything your phone has + network + storage + charging speed</div>
  <div id="reportContainer"></div>
  <button id="recheckBtn" class="recheck-btn">🔄 RECHECK EVERYTHING</button>
  <footer>⚡ Live data · Some features require HTTPS or permissions</footer>
</div>

<script>
  (function() {
    const container = document.getElementById("reportContainer");
    const recheckBtn = document.getElementById("recheckBtn");

    function formatYesNo(condition) {
      return condition ? "<span class='badge-yes'>✅ Yes / Supported</span>" : "<span class='badge-no'>❌ No / Not supported</span>";
    }

    // Estimate Antutu
    function estimateAntutuScore(cpuCores, ramGB, gpuName, webgl2, webgl1) {
      let base = 0;
      if (cpuCores >= 8) base += 180000;
      else if (cpuCores >= 6) base += 130000;
      else if (cpuCores >= 4) base += 80000;
      else base += 40000;
      if (ramGB >= 8) base += 60000;
      else if (ramGB >= 6) base += 45000;
      else if (ramGB >= 4) base += 30000;
      else if (ramGB === "Not detectable") base += 15000;
      else base += 10000;
      const gpuLower = gpuName.toLowerCase();
      if (webgl2 && (gpuLower.includes("adreno 600") || gpuLower.includes("mali g78") || gpuLower.includes("apple gpu") || gpuLower.includes("snapdragon 8"))) base += 200000;
      else if (webgl2 && (gpuLower.includes("adreno 500") || gpuLower.includes("mali g76"))) base += 130000;
      else if (webgl2) base += 90000;
      else if (webgl1) base += 50000;
      else base += 20000;
      if ('ontouchstart' in window) base += 10000;
      if (navigator.deviceMemory && navigator.deviceMemory >= 6) base += 20000;
      const min = Math.round(base * 0.8);
      const max = Math.round(base * 1.2);
      return { min, max };
    }

    // Helper to get network info
    function getNetworkInfo() {
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (!conn) return { type: "Not available", downlink: "N/A", rtt: "N/A", saveData: "Unknown" };
      return {
        type: conn.effectiveType || "unknown",
        downlink: conn.downlink ? conn.downlink + " Mbps" : "N/A",
        rtt: conn.rtt ? conn.rtt + " ms" : "N/A",
        saveData: conn.saveData ? "Enabled (reduces data usage)" : "Disabled"
      };
    }

    // Storage estimate
    async function getStorageEstimate() {
      if ('storage' in navigator && 'estimate' in navigator.storage) {
        try {
          const estimate = await navigator.storage.estimate();
          const usage = estimate.usage ? (estimate.usage / (1024**3)).toFixed(1) + " GB" : "Unknown";
          const quota = estimate.quota ? (estimate.quota / (1024**3)).toFixed(1) + " GB" : "Unknown";
          return { usage, quota };
        } catch(e) { return { usage: "Error", quota: "Error" }; }
      }
      return { usage: "Not supported", quota: "Not supported" };
    }

    // Refresh rate detection (simple)
    function detectRefreshRate() {
      return new Promise((resolve) => {
        let frames = 0;
        let start = performance.now();
        function count() {
          frames++;
          const now = performance.now();
          if (now - start >= 1000) {
            const fps = Math.round(frames);
            resolve(fps);
          } else {
            requestAnimationFrame(count);
          }
        }
        requestAnimationFrame(count);
      });
    }

    async function runFullInspection() {
      container.innerHTML = `<div class="card"><div class="card-content">⏳ Scanning your device... (this may take a few seconds)</div></div>`;
      try {
        // --- Basic info ---
        const ua = navigator.userAgent;
        let deviceModel = "Unknown";
        if (ua.includes("iPhone")) deviceModel = "iPhone";
        else if (ua.includes("SM-")) deviceModel = "Samsung Galaxy";
        else if (ua.includes("Pixel")) deviceModel = "Google Pixel";
        else if (ua.includes("OnePlus")) deviceModel = "OnePlus";
        else if (ua.includes("Mi ") || ua.includes("Redmi")) deviceModel = "Xiaomi";
        else if (/Android/.test(ua)) deviceModel = "Android Device";
        else if (/iPad|iPod/.test(ua)) deviceModel = "iPad";
        const platform = navigator.platform || "unknown";
        
        const cpuCores = navigator.hardwareConcurrency || "unknown";
        const ramGB = navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Not detectable";
        
        const screenWidth = screen.width;
        const screenHeight = screen.height;
        const colorDepth = screen.colorDepth;
        const pixelRatio = window.devicePixelRatio || 1;
        const touchSupport = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const maxTouchPoints = navigator.maxTouchPoints || "Not detected";
        
        // Stylus / pointer
        const coarsePointer = window.matchMedia('(pointer: coarse)').matches;
        const finePointer = window.matchMedia('(pointer: fine)').matches;
        const hoverCapable = window.matchMedia('(hover: hover)').matches;
        let stylusSupport = "Unknown";
        if (finePointer && !coarsePointer) stylusSupport = "Stylus / mouse likely";
        else if (coarsePointer) stylusSupport = "Finger touch (stylus not detected)";
        else stylusSupport = "Unknown";
        
        // Foldable detection (simple)
        const foldable = window.matchMedia('(spanning: single-fold-vertical)').matches || window.matchMedia('(spanning: single-fold-horizontal)').matches;
        
        // --- GPU & WebGL ---
        let webgl1 = false, webgl2 = false, gpuRenderer = "Unknown", gpuVendor = "Unknown";
        let maxTextureSize = 0, maxVertexAttribs = 0, maxVaryings = 0, maxCombinedTexUnits = 0;
        let extensions = [];
        try {
          const canvas = document.createElement('canvas');
          let gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
          if (gl) {
            webgl1 = true;
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            if (debug) {
              gpuRenderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
              gpuVendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL);
            } else {
              gpuRenderer = gl.getParameter(gl.RENDERER) || "Unknown";
              gpuVendor = gl.getParameter(gl.VENDOR) || "Unknown";
            }
            maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
            maxVertexAttribs = gl.getParameter(gl.MAX_VERTEX_ATTRIBS);
            maxVaryings = gl.getParameter(gl.MAX_VARYING_VECTORS);
            maxCombinedTexUnits = gl.getParameter(gl.MAX_COMBINED_TEXTURE_IMAGE_UNITS);
            extensions = gl.getSupportedExtensions() || [];
          }
          if (canvas.getContext('webgl2')) webgl2 = true;
        } catch(e) {}
        
        const extensionCount = extensions.length;
        const hasAnisotropic = extensions.includes('EXT_texture_filter_anisotropic');
        const hasFloatTextures = extensions.includes('OES_texture_float');
        const hasCompressedTexture = extensions.includes('WEBGL_compressed_texture_etc');
        
        // --- Battery (full details) ---
        let batteryHtml = "";
        let chargingWattageInputHtml = "";
        if ('getBattery' in navigator) {
          try {
            const battery = await navigator.getBattery();
            const level = Math.round(battery.level * 100);
            const charging = battery.charging;
            const chargingTime = battery.chargingTime !== Infinity ? (battery.chargingTime / 60).toFixed(0) + " minutes" : "Full / unknown";
            const dischargingTime = battery.dischargingTime !== Infinity ? (battery.dischargingTime / 60).toFixed(0) + " minutes" : "Plugged in / unknown";
            batteryHtml = `
              <div class="check-item"><div class="check-label">🔋 Battery level</div><div class="check-value">${level}%</div><div class="check-explanation">Current charge. Below 20% may throttle performance.</div></div>
              <div class="check-item"><div class="check-label">⚡ Charging status</div><div class="check-value">${charging ? "Charging" : "Not charging"}</div><div class="check-explanation">When charging, most phones run at full speed.</div></div>
              <div class="check-item"><div class="check-label">⏱️ Estimated time to full (if charging)</div><div class="check-value">${chargingTime}</div><div class="check-explanation">Time until battery reaches 100% (based on current rate).</div></div>
              <div class="check-item"><div class="check-label">⏱️ Estimated battery life left</div><div class="check-value">${dischargingTime}</div><div class="check-explanation">Approximate runtime remaining if not charging.</div></div>
            `;
            // Add wattage input
            chargingWattageInputHtml = `
              <div class="check-item">
                <div class="check-label">⚡ Charging wattage (manual input)</div>
                <div class="check-value"><input type="number" id="wattageInput" class="input-watt" placeholder="e.g., 58" step="1"> <span style="font-size:0.8rem;">Watts</span></div>
                <div class="check-explanation">Browsers cannot detect wattage directly. Enter your charger's max output (e.g., 58W). This helps estimate charging speed.</div>
              </div>
            `;
          } catch(e) {
            batteryHtml = `<div class="check-item"><div class="check-label">🔋 Battery</div><div class="check-value">${formatYesNo(false)}</div><div class="check-explanation">Could not read battery status.</div></div>`;
          }
        } else {
          batteryHtml = `<div class="check-item"><div class="check-label">🔋 Battery API</div><div class="check-value">${formatYesNo(false)}</div><div class="check-explanation">Your browser does not support Battery API.</div></div>`;
        }
        
        // --- Network info ---
        const net = getNetworkInfo();
        
        // --- Storage estimate ---
        const storage = await getStorageEstimate();
        
        // --- Refresh rate ---
        const refreshRate = await detectRefreshRate();
        
        // --- CPU architecture (high entropy, optional) ---
        let arch = "Not available";
        if ('userAgentData' in navigator && navigator.userAgentData.getHighEntropyValues) {
          try {
            const hints = await navigator.userAgentData.getHighEntropyValues(['architecture']);
            arch = hints.architecture || "Unknown";
          } catch(e) {}
        }
        
        // --- Antutu ---
        const antutu = estimateAntutuScore(cpuCores === "unknown" ? 4 : cpuCores, ramGB === "Not detectable" ? 3 : parseFloat(ramGB), gpuRenderer, webgl2, webgl1);
// --- Build HTML sections ---
let html = `
  <div class="card">
    <div class="card-header"><h2>📱 DEVICE & SYSTEM</h2></div>
    <div class="card-content">
      <div class="check-item"><div class="check-label">📱 Model</div><div class="check-value">${deviceModel}</div><div class="check-explanation">Detected from browser user agent.</div></div>
      <div class="check-item"><div class="check-label">🖥️ Platform</div><div class="check-value">${platform}</div><div class="check-explanation">Operating system and architecture.</div></div>
      <div class="check-item"><div class="check-label">🧠 CPU Architecture</div><div class="check-value">${arch}</div><div class="check-explanation">Instruction set (e.g., arm64, x86). May require permission.</div></div>
      <div class="check-item"><div class="check-label">🧠 CPU Cores (logical)</div><div class="check-value">${cpuCores === "unknown" ? "Not detectable" : cpuCores}</div><div class="check-explanation">More cores = better multitasking. ${cpuCores >= 8 ? "Flagship level." : cpuCores >= 6 ? "Mid-range." : "Entry-level."}</div></div>
      <div class="check-item"><div class="check-label">💾 RAM</div><div class="check-value">${ramGB}</div><div class="check-explanation">${ramGB.includes("8") ? "Excellent for gaming." : ramGB.includes("6") ? "Good." : ramGB.includes("4") ? "Decent." : "Limited."}</div></div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header"><h2>🖥️ DISPLAY & TOUCH</h2></div>
    <div class="card-content">
      <div class="check-item"><div class="check-label">📺 Resolution</div><div class="check-value">${screenWidth} x ${screenHeight}</div><div class="check-explanation">Pixel count. Higher = sharper but heavier for GPU.</div></div>
      <div class="check-item"><div class="check-label">🎨 Color depth</div><div class="check-value">${colorDepth}-bit</div><div class="check-explanation">Standard is 24-32 bits.</div></div>
      <div class="check-item"><div class="check-label">🔍 Pixel ratio</div><div class="check-value">${pixelRatio}</div><div class="check-explanation">Physical vs CSS pixels. High = dense display.</div></div>
      <div class="check-item"><div class="check-label">🔄 Screen refresh rate</div><div class="check-value">~${refreshRate} Hz</div><div class="check-explanation">Higher refresh (90Hz+) makes motion smoother. Measured over 1 second.</div></div>
      <div class="check-item"><div class="check-label">👆 Touch screen</div><div class="check-value">${formatYesNo(touchSupport)}</div></div>
      <div class="check-item"><div class="check-label">🖐️ Max touch points</div><div class="check-value">${maxTouchPoints}</div><div class="check-explanation">How many fingers can be detected simultaneously.</div></div>
      <div class="check-item"><div class="check-label">✍️ Stylus / pointer</div><div class="check-value">${stylusSupport}</div><div class="check-explanation">Based on CSS pointer media queries.</div></div>
      <div class="check-item"><div class="check-label">📖 Foldable screen</div><div class="check-value">${foldable ? "✅ Detected" : "❌ Not detected"}</div><div class="check-explanation">If your device folds, this may show as supported.</div></div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header"><h2>🎮 GRAPHICS (GPU)</h2></div>
    <div class="card-content">
      <div class="check-item"><div class="check-label">🖥️ GPU Renderer</div><div class="check-value">${gpuRenderer}</div></div>
      <div class="check-item"><div class="check-label">🏭 GPU Vendor</div><div class="check-value">${gpuVendor}</div></div>
      <div class="check-item"><div class="check-label">🎮 WebGL 1.0</div><div class="check-value">${formatYesNo(webgl1)}</div></div>
      <div class="check-item"><div class="check-label">⚡ WebGL 2.0</div><div class="check-value">${formatYesNo(webgl2)}</div><div class="check-explanation">Newer, faster 3D rendering.</div></div>
      <div class="check-item"><div class="check-label">📏 Max texture size</div><div class="check-value">${maxTextureSize > 0 ? maxTextureSize.toLocaleString() + " px" : "N/A"}</div></div>
      <div class="check-item"><div class="check-label">🧩 Max vertex attributes</div><div class="check-value">${maxVertexAttribs}</div></div>
      <div class="check-item"><div class="check-label">🌀 Max varying vectors</div><div class="check-value">${maxVaryings}</div><div class="check-explanation">Shader complexity limit.</div></div>
      <div class="check-item"><div class="check-label">📦 Max combined texture units</div><div class="check-value">${maxCombinedTexUnits}</div></div>
      <div class="check-item"><div class="check-label">🔧 WebGL extensions</div><div class="check-value">${extensionCount} extensions supported</div><div class="check-explanation">Including ${hasAnisotropic ? "anisotropic filtering ✅" : "no anisotropic"} | ${hasFloatTextures ? "float textures ✅" : "no float textures"} | ${hasCompressedTexture ? "ETC compression ✅" : "no ETC compression"}</div></div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header"><h2>🔋 BATTERY & CHARGING</h2></div>
    <div class="card-content">
      ${batteryHtml}
      ${chargingWattageInputHtml}
    </div>
  </div>
  
  <div class="card">
    <div class="card-header"><h2>🌐 NETWORK & CONNECTIVITY</h2></div>
    <div class="card-content">
      <div class="check-item"><div class="check-label">📡 Effective connection type</div><div class="check-value">${net.type}</div><div class="check-explanation">4G, 5G, Wi-Fi, etc. Affects online gaming.</div></div>
      <div class="check-item"><div class="check-label">⬇️ Estimated downlink</div><div class="check-value">${net.downlink}</div></div>
      <div class="check-item"><div class="check-label">⏱️ Round-trip time (latency)</div><div class="check-value">${net.rtt}</div></div>
      <div class="check-item"><div class="check-label">💾 Save-Data mode</div><div class="check-value">${net.saveData}</div><div class="check-explanation">User requests less data usage.</div></div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header"><h2>💾 STORAGE</h2></div>
    <div class="card-content">
      <div class="check-item"><div class="check-label">📦 Estimated usage</div><div class="check-value">${storage.usage}</div></div>
      <div class="check-item"><div class="check-label">🗄️ Estimated total quota</div><div class="check-value">${storage.quota}</div><div class="check-explanation">Total space available for this site (not whole device).</div></div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header"><h2>📡 SENSORS & FEATURES</h2></div>
    <div class="card-content">
      <div class="check-item"><div class="check-label">🧭 Gyroscope</div><div class="check-value">${formatYesNo('DeviceOrientationEvent' in window)}</div></div>
      <div class="check-item"><div class="check-label">📳 Accelerometer</div><div class="check-value">${formatYesNo('DeviceMotionEvent' in window)}</div></div>
      <div class="check-item"><div class="check-label">📍 Geolocation</div><div class="check-value">${formatYesNo('geolocation' in navigator)}</div></div>
      <div class="check-item"><div class="check-label">📳 Vibration</div><div class="check-value">${formatYesNo('vibrate' in navigator)}</div></div>
      <div class="check-item"><div class="check-label">📸 Camera access</div><div class="check-value">${formatYesNo('mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices)}</div></div>
    </div>
  </div>          
          <div class="card">
            <div class="card-header"><h2>🏆 ESTIMATED ANTUTU SCORE</h2></div>
            <div class="card-content">
              <div class="antutu-box">
                <div style="font-size:0.9rem; margin-bottom:8px;">📊 Estimated Range (based on your hardware)</div>
                <div class="antutu-score">${antutu.min.toLocaleString()} – ${antutu.max.toLocaleString()}</div>
                <div style="font-size:0.75rem; margin-top:10px;">Antutu tests CPU, GPU, memory, UX. Higher = better.</div>
              </div>
              <div class="check-explanation" style="margin-top:16px;"><strong>What this means for you:</strong><br>
                ${antutu.max >= 500000 ? "🏆 Flagship: Play any game at high settings." : antutu.max >= 300000 ? "📱 Upper mid-range: Most games at medium/high." : antutu.max >= 150000 ? "⚙️ Entry-level: Light games, heavy ones may lag." : "🔋 Basic performance: Casual games only."}
              </div>
            </div>
          </div>
          
          <div class="card">
            <div class="card-header"><h2>📋 FINAL SUMMARY</h2></div>
            <div class="card-content">
              <div class="check-item">
                <div class="check-label">✅ What your phone HAS</div>
                <div class="check-value">${[
                  webgl1 ? "WebGL 1.0" : null,
                  webgl2 ? "WebGL 2.0" : null,
                  touchSupport ? "Touch screen" : null,
                  'DeviceOrientationEvent' in window ? "Gyroscope" : null,
                  'DeviceMotionEvent' in window ? "Accelerometer" : null,
                  'geolocation' in navigator ? "Geolocation" : null,
                  'vibrate' in navigator ? "Vibration" : null,
                  ('mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices) ? "Camera access" : null,
                  maxTouchPoints > 1 ? "Multi-touch" : null,
                  hasAnisotropic ? "Anisotropic filtering" : null
                ].filter(Boolean).join(", ") || "Basic features only"}</div>
              </div>
              <div class="check-item">
                <div class="check-label">❌ What your phone DOES NOT HAVE (or undetectable)</div>
                <div class="check-value">${[
                  !webgl1 ? "WebGL 1.0" : null,
                  !webgl2 ? "WebGL 2.0" : null,
                  !touchSupport ? "Touch screen" : null,
                  !('DeviceOrientationEvent' in window) ? "Gyroscope" : null,
                  !('DeviceMotionEvent' in window) ? "Accelerometer" : null,
                  !('geolocation' in navigator) ? "Geolocation" : null,
                  !('vibrate' in navigator) ? "Vibration" : null,
                  !('mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices) ? "Camera access" : null,
                  maxTouchPoints <= 1 ? "Multi-touch" : null,
                  ramGB === "Not detectable" ? "RAM detection" : null,
                  cpuCores === "unknown" ? "CPU core detection" : null
                ].filter(Boolean).join(", ") || "Everything seems supported!"}</div>
              </div>
            </div>
          </div>
        `;
        
        container.innerHTML = html;
        
        // After DOM is ready, attach wattage input listener to save value (optional)
        const wattInput = document.getElementById("wattageInput");
        if (wattInput) {
          wattInput.addEventListener("input", function() {
            localStorage.setItem("userWattage", this.value);
          });
          const saved = localStorage.getItem("userWattage");
          if (saved) wattInput.value = saved;
        }
        
      } catch(error) {
        console.error(error);
        container.innerHTML = `<div class="card"><div class="card-content">❌ Error: ${error.message}</div></div>`;
      }
    }
    
    // Initial load
    runFullInspection();
    recheckBtn.addEventListener("click", () => runFullInspection());
  })();
</script>
</body>
</html>
